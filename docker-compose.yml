services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devnetcontrol-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DEVNETCONTROL_JWT_KEY=${DEVNETCONTROL_JWT_KEY}
      - DEVNETCONTROL_ENCRYPTION_KEY=${DEVNETCONTROL_ENCRYPTION_KEY}
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=devnetcontrol;Username=postgres;Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devnetcontrol-network

  db:
    image: postgres:17-alpine
    container_name: devnetcontrol-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=devnetcontrol
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devnetcontrol-network

volumes:
  postgres-data:

networks:
  devnetcontrol-network:
    driver: bridge
